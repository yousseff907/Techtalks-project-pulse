services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    networks:
      - project-pulse
    depends_on:
      postgres:
        condition: service_healthy  # Waits for postgres healthcheck to pass
      redis:
        condition: service_started  # Starts after redis container launches

  postgres:
    image: postgres:17
    env_file:
      - .env
    networks:
      - project-pulse
    volumes:
      - postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 5
  
  redis:
    image: redis
    networks:
      - project-pulse
  
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_app worker --loglevel=info
    networks:
      - project-pulse
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A celery_app beat --loglevel=info
    networks:
      - project-pulse
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    env_file:
      - .env
    networks:
      - project-pulse
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    networks:
      - project-pulse

volumes:
  postgres:
    # driver: local
    # driver_opts:
    #   type: none
    #   o: bind
    #   device: /home/admin/data/           [IN PROD]

networks:
  project-pulse:
    driver: bridge