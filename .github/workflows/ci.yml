name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  CI:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v7

      - name: Set Up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: "pip"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      
      - name: Running Linter - Ruff
        uses: astral-sh/ruff-action@v4.0.0
      
      - name: Running Pytest
        run: pytest backend/tests/

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
          TZ: UTC
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5